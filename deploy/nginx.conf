# /etc/nginx/sites-available/appcontagem
# Após instalar: ln -s /etc/nginx/sites-available/appcontagem /etc/nginx/sites-enabled/

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS com reverse proxy para o Node.js
server {
    listen 443 ssl;
    server_name SEU_DOMINIO.com;

    # Certificados gerados pelo Certbot (preenchido automaticamente)
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de segurança
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Limite de tamanho de upload (igual ao backend)
    client_max_body_size 2M;

    # Compressão
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # Rate limiting no nível do Nginx (camada extra antes do Node)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Swagger só acessível com token (proteção extra: bloquear em produção se quiser)
    location /api/docs {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
