# ── ROOT (domínio nu — redireciona para app) ─────────────────
server {
    listen 80;
    server_name sistemaspizzafabio.com.br www.sistemaspizzafabio.com.br;
    return 301 https://app.sistemaspizzafabio.com.br$request_uri;
}
