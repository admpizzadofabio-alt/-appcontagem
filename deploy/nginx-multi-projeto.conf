# /etc/nginx/sites-available/pizzafabio
# VPS: 191.252.93.209 | Domínio: sistemaspizzafabio.com.br
#
# Subdomínios → Portas:
#   app.sistemaspizzafabio.com.br     → 3333  (APPCONTAGEM)
#   projeto2.sistemaspizzafabio.com.br → 3334  (Proteina / outro)
#   projeto3.sistemaspizzafabio.com.br → 3335  (futuro)
#   projeto4.sistemaspizzafabio.com.br → 3336  (futuro)
#
# Para adicionar projetos: copie um bloco server e ajuste server_name + proxy_pass.

# ── APPCONTAGEM ──────────────────────────────────────────────
server {
    listen 80;
    server_name app.sistemaspizzafabio.com.br;
    # Certbot vai adicionar listen 443 aqui automaticamente

    client_max_body_size 10M;

    location /api/ {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        return 200 '{"projeto":"appcontagem","status":"ok"}';
        add_header Content-Type application/json;
    }
}

# ── PROJETO 2 (ex: proteina.sistemaspizzafabio.com.br) ───────
server {
    listen 80;
    server_name projeto2.sistemaspizzafabio.com.br;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass         http://127.0.0.1:3334;
        proxy_http_version 1.1;
